name: Update GitHub Stars

on:
  schedule:
    # 每天凌晨 2 点运行
    - cron: '0 2 * * *'
  workflow_dispatch: # 手动触发

jobs:
  update-stars:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Fetch GitHub Stars
      run: |
        # 定义仓库列表（已验证）
        REPOS=(
          "karpathy/autoresearch"
          "666ghj/MiroFish"
          "langchain-ai/langgraph"
          "assafelovic/gpt-researcher"
          "openai/swarm"
          "volcengine/OpenViking"
          "BUPT-GAMMA/MASFactory"
          "kangfenmao/cherry-studio"
        )
        
        # 创建 JSON 文件
        echo "{" > stars.json
        echo "  \"date\": \"$(date -Iseconds)\"," >> stars.json
        echo "  \"repos\": {" >> stars.json
        
        first=true
        for repo in "${REPOS[@]}"; do
          stars=$(curl -s "https://api.github.com/repos/$repo" | jq -r '.stargazers_count // 0')
          
          if [ "$first" = true ]; then
            first=false
          else
            echo "," >> stars.json
          fi
          
          echo "    \"$repo\": $stars" >> stars.json
        done
        
        echo "" >> stars.json
        echo "  }" >> stars.json
        echo "}" >> stars.json
        
    - name: Update README
      run: |
        # 读取 Stars 数据
        AUTORESEARCH=$(jq -r '.repos["karpathy/autoresearch"]' stars.json)
        MIROFISH=$(jq -r '.repos["666ghj/MiroFish"]' stars.json)
        LANGGRAPH=$(jq -r '.repos["langchain-ai/langgraph"]' stars.json)
        GPTRESEARCHER=$(jq -r '.repos["assafelovic/gpt-researcher"]' stars.json)
        SWARM=$(jq -r '.repos["openai/swarm"]' stars.json)
        OPENVIKING=$(jq -r '.repos["volcengine/OpenViking"]' stars.json)
        MASFACTORY=$(jq -r '.repos["BUPT-GAMMA/MASFactory"]' stars.json)
        CHERRYSTUDIO=$(jq -r '.repos["kangfenmao/cherry-studio"]' stars.json)
        
        # 更新 README 中的 Stars 数量
        sed -i "s/| \*\*Auto-Research\*\* | ~[0-9.]*k/| **Auto-Research** | ~$(echo "scale=1; $AUTORESEARCH/1000" | bc)k/" README.md
        sed -i "s/| \*\*MiroFish\*\* | ~[0-9.]*k/| **MiroFish** | ~$(echo "scale=1; $MIROFISH/1000" | bc)k/" README.md
        sed -i "s/| \*\*LangGraph\*\* | ~[0-9.]*k/| **LangGraph** | ~$(echo "scale=1; $LANGGRAPH/1000" | bc)k/" README.md
        sed -i "s/| \*\*GPT Researcher\*\* | ~[0-9.]*k/| **GPT Researcher** | ~$(echo "scale=1; $GPTRESEARCHER/1000" | bc)k/" README.md
        sed -i "s/| \*\*Swarm\*\* | ~[0-9.]*k/| **Swarm** | ~$(echo "scale=1; $SWARM/1000" | bc)k/" README.md
        sed -i "s/| \*\*OpenViking\*\* | ~[0-9.]*k/| **OpenViking** | ~$(echo "scale=1; $OPENVIKING/1000" | bc)k/" README.md
        sed -i "s/| \*\*MAS Factory\*\* | ~[0-9]*/| **MAS Factory** | ~$MASFACTORY/" README.md
        sed -i "s/| \*\*Cherry Studio\*\* | ~[0-9]*/| **Cherry Studio** | ~$CHERRYSTUDIO/" README.md
        
    - name: Commit changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add README.md stars.json
        git commit -m "自动更新 Stars 数量 - $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push
